name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Opt in to Node 24 for the actions runtime (checkout/setup-node v4 currently
# default to Node 20, which is deprecated and will be removed from runners on
# 2026-09-16). Remove this once v5 actions ship with Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test
